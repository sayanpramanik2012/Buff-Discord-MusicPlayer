version: '3.8'

services:
  musicbot:
    build: .
    restart: unless-stopped
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      SPOTIFY_CLIENT_ID: ${SPOTIFY_CLIENT_ID}
      SPOTIFY_CLIENT_SECRET: ${SPOTIFY_CLIENT_SECRET}
      PREFIX: ${PREFIX:-#}
      FLASK_PORT: ${FLASK_PORT:-5000}
    ports:
      - "${FLASK_PORT:-5000}:5000"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
